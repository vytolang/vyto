name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install native deps (ICU for vyto/intl)
        run: sudo apt-get update && sudo apt-get install -y libicu-dev

      - name: Build vytoc (zero third-party deps)
        run: make vytoc vytobind

      - name: Core language + stdlib smoke
        run: |
          set -e
          # 01_hello has a golden output; the rest just need to build+run clean.
          out=$(./vytoc run examples/01_hello.vt | head -1)
          test "$out" = "hello, vyto" || { echo "01_hello: got '$out'"; exit 1; }
          for ex in 02_structs 03_classes 04_closures 06_ffi 07_modules 10_strings \
                    22_consts 23_num_methods 24_string_methods 25_array_methods \
                    26_array_hof 27_map_methods 40_fmt 41_json 42_file 43_time \
                    44_date 45_os; do
            echo "== $ex =="
            ./vytoc run "examples/$ex.vt" >/dev/null
          done

      - name: vyto/intl (ICU) smoke
        run: ./vytoc run examples/intl_demo.vt

  # Full suite (incl. gfx/ui) needs blend2d — build it, then run tests.
  # Kept separate so a blend2d hiccup doesn't mask a core regression.
  full-suite:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libicu-dev cmake ninja-build libcurl4-openssl-dev

      - name: Vendor blend2d (vyto/gfx)
        run: lib/vyto/gfx/native/build-blend2d.sh linux-x64

      - name: Build + full test suite
        run: make test
